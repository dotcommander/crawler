version: '3'

vars:
  BINARY: crawler

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the crawler binary
    cmds:
      - go build -o {{.BINARY}} .
    sources:
      - '**/*.go'
      - go.mod
      - go.sum

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f {{.BINARY}}

  test:
    desc: Run tests
    cmds:
      - go test ./...

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  install:
    desc: Build and install the crawler binary
    cmds:
      - go install .
